<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noriton: Grand Maze Masterpiece</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #0d0d0d; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; overflow: hidden; }
        .setup-container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 4px solid #f1c40f; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); z-index: 100; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; margin-bottom: 8px; color: #f1c40f; font-weight: bold; }
        .input-group input { padding: 8px; width: 70px; text-align: center; font-size: 1.1em; border-radius: 8px; border: 2px solid #f1c40f; background: #000; color: #fff; }
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        #board-container { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; }
        #board { display: grid; background: #000; border: 2px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .cell { width: 28px; height: 28px; position: relative; box-sizing: border-box; }
        .wall { background: #000; } 
        .path { background: #222f3e; border: 1px solid rgba(255,255,255,0.03); }
        .gray { background: #576574; }
        .blue { background: #2980b9; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); }
        .red { background: #c0392b; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); }
        .start { background: #fff; color: #000; font-weight: bold; font-size: 0.7em; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px #fff; }
        .goal { background: #1e8449; color: #fff; font-weight: bold; font-size: 0.7em; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #2ecc71; }
        .pawn { width: 20px; height: 20px; background: #f1c40f; border-radius: 50%; border: 2px solid #000; z-index: 10; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 12px #f1c40f; transition: all 0.2s; }
        .movable { cursor: pointer; border: 2px dashed #f1c40f !important; z-index: 5; background: #444 !important; }
        .ui-panel { background: #1a1a1a; padding: 15px; border-radius: 12px; display: flex; gap: 12px; align-items: center; width: 95%; max-width: 900px; border: 1px solid #333; margin-bottom: 5px; justify-content: center; flex-wrap: wrap; }
        .ui-panel input { width: 60px; padding: 10px; text-align: center; font-weight: bold; border: 2px solid #f1c40f; background: #000; color: #f1c40f; border-radius: 5px; font-size: 1.1em; }
        button { padding: 10px 20px; font-weight: bold; font-size: 1em; background: #f1c40f; color: #000; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0 #d4ac0d; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d4ac0d; }
        #log { flex-basis: 100%; background: #000; color: #2ecc71; padding: 12px; border-radius: 5px; font-family: monospace; font-size: 0.95em; border-left: 4px solid #2ecc71; text-align: left; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="setup-screen" class="setup-container">
        <h1 style="color:#f1c40f; margin-top:0;">🏰 노리톤 대미궁</h1>
        <div class="input-group">
            <label>갈림길 생성 개수</label>
            <input type="number" id="fork-count" value="6" min="1" max="20">
        </div>
        <div class="input-group">
            <label>목표(GOAL) 개수</label>
            <input type="number" id="goal-count" value="3" min="1" max="10">
        </div>
        <button onclick="startGame()">미궁 설계 및 입장</button>
    </div>

    <div id="game-screen">
        <div id="board-container">
            <div id="board"></div>
        </div>
        <div class="ui-panel">
            <div style="color:#f1c40f; font-weight:bold; font-size:1.1em; margin-right: 10px;">행동력: <span id="steps-left">0</span></div>
            <input type="number" id="dice-input" placeholder="0">
            <button onclick="applySteps()">이동력 주입</button>
            <button onclick="resetMaze()" style="background:#c0392b; box-shadow:0 4px 0 #922b21; color:#fff; margin-left: auto;">맵 재설계</button>
            <div id="log">안전하게 미궁에 진입했습니다. 행동력을 입력하고 탐사를 시작하세요.</div>
        </div>
    </div>

    <script>
        const TILE_SIZE = 28;
        // 브라우저 해상도에 맞춰 그리드 크기 동적 계산 (최소 크기 보장으로 버그 방지)
        const BOARD_COLS = Math.max(30, Math.floor(window.innerWidth * 0.9 / TILE_SIZE));
        const BOARD_ROWS = Math.max(20, Math.floor(window.innerHeight * 0.7 / TILE_SIZE));
        
        let grid = [];
        let playerPos = { x: 1, y: 1 };
        let moveSteps = 0;
        let goalList = [];
        let allPaths = [];

        function startGame() {
            const forks = parseInt(document.getElementById('fork-count').value) || 5;
            const goals = parseInt(document.getElementById('goal-count').value) || 2;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            buildMaze(forks, goals);
        }

        function buildMaze(totalForks, totalGoals) {
            const board = document.getElementById('board');
            board.style.gridTemplateColumns = `repeat(${BOARD_COLS}, ${TILE_SIZE}px)`;
            board.innerHTML = '';
            
            // 오류 해결: BOARD_COLS를 정확히 사용하여 배열 초기화
            grid = Array(BOARD_ROWS).fill().map(() => Array(BOARD_COLS).fill(0));
            goalList = [];
            allPaths = [];

            let startY = Math.floor(BOARD_ROWS / 2);

            // 1. 확실한 메인 척추 경로 (가로로 길게 뻗도록 강제)
            let mainRoot = createTrunkPath(1, startY);
            allPaths.push(...mainRoot);

            // 2. 갈림길 무작위 생성 (메인 경로 & 생성된 가지에서 뻗어나감)
            let forksCreated = 0;
            let attempts = 0;
            let branches = [];

            while(forksCreated < totalForks && attempts < 300) {
                let basePoint = allPaths[Math.floor(Math.random() * allPaths.length)];
                let branchLen = Math.floor(Math.random() * 15) + 8; // 가지의 길이
                
                let newBranch = createBranchPath(basePoint.x, basePoint.y, branchLen);
                if(newBranch.length > 3) { // 의미 있는 길이의 가지만 성공으로 인정
                    allPaths.push(...newBranch);
                    branches.push(newBranch);
                    forksCreated++;
                }
                attempts++;
            }

            // 3. 목표 지점(GOAL)을 가장 긴 나뭇가지 끝에 배치
            branches.sort((a, b) => b.length - a.length); // 긴 가지부터 정렬
            for(let i = 0; i < totalGoals && i < branches.length; i++) {
                goalList.push(branches[i][branches[i].length - 1]);
            }
            
            // 골이 부족하면 메인 척추 끝에 추가
            if(goalList.length < totalGoals && mainRoot.length > 0) {
                goalList.push(mainRoot[mainRoot.length - 1]);
            }
            if(goalList.length === 0) goalList.push(mainRoot[mainRoot.length - 1]);

            // 4. 화면에 타일 그리기
            for(let y = 0; y < BOARD_ROWS; y++) {
                for(let x = 0; x < BOARD_COLS; x++) {
                    const cell = document.createElement('div');
                    cell.id = `c-${x}-${y}`;
                    cell.className = 'cell ' + (grid[y][x] === 1 ? 'path' : 'wall');
                    
                    if(grid[y][x] === 1) {
                        const isStart = (x === 1 && y === startY);
                        const isGoal = goalList.find(g => g.x === x && g.y === y);
                        
                        if(isStart) { 
                            cell.classList.add('start'); cell.innerText = "S"; 
                            playerPos = {x, y}; 
                        } else if(isGoal) { 
                            cell.classList.add('goal'); cell.innerText = "G"; 
                        } else {
                            // 이벤트 칸 무작위 배치 (회색 위주, 파랑/빨강 희귀)
                            const r = Math.random();
                            cell.classList.add(r < 0.15 ? 'blue' : (r < 0.3 ? 'red' : 'gray'));
                        }
                    }
                    board.appendChild(cell);
                }
            }
            updatePawn();
            logTxt(`미궁 생성 완료! 총 ${forksCreated}개의 갈림길이 생성되었습니다.`);
        }

        // [핵심 로직 1] 무조건 오른쪽으로 뻗어 나가는 메인 척추
        function createTrunkPath(sx, sy) {
            let path = [{x: sx, y: sy}];
            grid[sy][sx] = 1;
            let cx = sx, cy = sy;
            
            while(cx < BOARD_COLS - 3) {
                // 오른쪽으로 갈 확률을 매우 높임
                let dirs = [{x:1, y:0}, {x:1, y:0}, {x:1, y:0}, {x:0, y:1}, {x:0, y:-1}].sort(() => Math.random() - 0.5);
                let moved = false;

                for(let d of dirs) {
                    let nx = cx + d.x, ny = cy + d.y;
                    if(nx > 0 && nx < BOARD_COLS - 1 && ny > 0 && ny < BOARD_ROWS - 1 && grid[ny][nx] === 0) {
                        let neighbors = countNeighbors(nx, ny);
                        if(neighbors === 1) { // 겹침 방지
                            grid[ny][nx] = 1;
                            cx = nx; cy = ny;
                            path.push({x: cx, y: cy});
                            moved = true;
                            break;
                        }
                    }
                }
                if(!moved) break;
            }
            return path;
        }

        // [핵심 로직 2] 나뭇가지처럼 자유롭게 뻗어 나가는 갈림길
        function createBranchPath(sx, sy, maxLen) {
            let path = [];
            let cx = sx, cy = sy;
            
            for(let i = 0; i < maxLen; i++) {
                let dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}].sort(() => Math.random() - 0.5);
                let moved = false;

                for(let d of dirs) {
                    let nx = cx + d.x, ny = cy + d.y;
                    if(nx > 0 && nx < BOARD_COLS - 1 && ny > 0 && ny < BOARD_ROWS - 1 && grid[ny][nx] === 0) {
                        let neighbors = countNeighbors(nx, ny);
                        if(neighbors === 1) { // 오직 연결된 부모 칸 하나하고만 접촉해야 함
                            grid[ny][nx] = 1;
                            cx = nx; cy = ny;
                            path.push({x: cx, y: cy});
                            moved = true;
                            break;
                        }
                    }
                }
                if(!moved) break; // 더 이상 뻗을 공간이 없으면 가지치기 종료
            }
            return path;
        }

        // 주변 상하좌우에 길이 몇 개인지 확인 (벽 유지 로직)
        function countNeighbors(x, y) {
            let count = 0;
            if(grid[y-1][x] === 1) count++;
            if(grid[y+1][x] === 1) count++;
            if(grid[y][x-1] === 1) count++;
            if(grid[y][x+1] === 1) count++;
            return count;
        }

        // --- 이동 및 판정 로직 ---
        function applySteps() {
            const val = parseInt(document.getElementById('dice-input').value);
            if(isNaN(val) || val <= 0) return;
            moveSteps = val;
            document.getElementById('steps-left').innerText = moveSteps;
            document.getElementById('dice-input').value = '';
            showMovable();
        }

        function showMovable() {
            document.querySelectorAll('.movable').forEach(el => { el.classList.remove('movable'); el.onclick = null; });
            if(moveSteps <= 0) { checkTile(); return; }

            [{x:0, y:1}, {x:0, y:-1}, {x:1, y:0}, {x:-1, y:0}].forEach(d => {
                let nx = playerPos.x + d.x, ny = playerPos.y + d.y;
                if(nx >= 0 && nx < BOARD_COLS && ny >= 0 && ny < BOARD_ROWS && grid[ny][nx] === 1) {
                    const el = document.getElementById(`c-${nx}-${ny}`);
                    el.classList.add('movable');
                    el.onclick = () => { 
                        playerPos = {x: nx, y: ny}; 
                        moveSteps--; 
                        document.getElementById('steps-left').innerText = moveSteps; 
                        updatePawn(); 
                        showMovable(); 
                    };
                }
            });
        }

        function updatePawn() {
            let p = document.getElementById('pawn') || document.createElement('div');
            p.id = 'pawn'; p.className = 'pawn';
            const currentCell = document.getElementById(`c-${playerPos.x}-${playerPos.y}`);
            if(currentCell) currentCell.appendChild(p);
        }

        function checkTile() {
            const isG = goalList.find(g => g.x === playerPos.x && g.y === playerPos.y);
            if(isG) { 
                alert("🎉 축하합니다! GOAL에 무사히 도달했습니다!"); 
                resetMaze(); 
                return; 
            }
            const cl = document.getElementById(`c-${playerPos.x}-${playerPos.y}`).classList;
            if(cl.contains('blue')) logTxt("턴 종료: [파란색] 행운이 따릅니다! 파밍 판정을 하세요.");
            else if(cl.contains('red')) logTxt("턴 종료: [빨간색] 위험합니다! Health 기반 회피 판정을 하세요.");
            else logTxt("턴 종료: 주변은 고요한 복도입니다. 다음 주사위를 굴리세요.");
        }

        function logTxt(m) { document.getElementById('log').innerText = "> " + m; }
        function resetMaze() { document.getElementById('setup-screen').style.display = 'block'; document.getElementById('game-screen').style.display = 'none'; }
    </script>
</body>
</html>
