<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noriton: The Grand Maze</title>
    <style>
        /* 기본 설정 (스크롤 완벽 방지) */
        body { font-family: 'Malgun Gothic', sans-serif; background: #0d0d0d; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* [대문 페이지] */
        .setup-container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 4px solid #f1c40f; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); z-index: 100; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; margin-bottom: 8px; color: #f1c40f; font-weight: bold; }
        .input-group input, .input-group select { padding: 8px; width: 150px; text-align: center; font-size: 1.1em; border-radius: 8px; border: 2px solid #f1c40f; background: #000; color: #fff; font-family: inherit; }
        
        /* [게임 화면] */
        #game-screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        #board-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; background: #111; border: 2px solid #333; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #board { display: grid; background: #000; margin: auto; padding: 5px; }

        /* 타일 디자인 */
        .cell { width: 28px; height: 28px; position: relative; box-sizing: border-box; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wall { background: #000; } 
        .path { background: #222f3e; border: 1px solid rgba(255,255,255,0.03); }
        
        /* 타일 색상 (이벤트) */
        .gray { background: #576574; }
        .blue { background: #2980b9; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); }
        .red { background: #c0392b; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); }
        .start { background: #fff !important; color: #000 !important; font-weight: bold; font-size: 0.7em; box-shadow: 0 0 10px #fff; }
        .goal { background: #1e8449 !important; color: #fff !important; font-weight: bold; font-size: 0.7em; box-shadow: 0 0 15px #2ecc71; }

        /* 안개 모드 (Fog of War) - GOAL까지 완벽하게 가리기 */
        #board.fog-mode .path:not(.start) { 
            background: #2f3640 !important; 
            box-shadow: none !important; 
            border: 1px solid #111 !important; 
            color: transparent !important; /* 'G' 텍스트 투명화 */
            transition: background 0.3s, color 0.3s; 
        }

        /* 말 & 이동 타일 */
        .pawn { width: 20px; height: 20px; background: #f1c40f; border-radius: 50%; border: 2px solid #000; z-index: 10; position: absolute; box-shadow: 0 0 12px #f1c40f; transition: all 0.2s; }
        .movable { cursor: pointer; border: 2px dashed #f1c40f !important; z-index: 5; background: #555 !important; }

        /* 하단 UI */
        .ui-panel { background: #1a1a1a; padding: 15px; border-radius: 12px; display: flex; gap: 12px; align-items: center; width: 95%; max-width: 900px; border: 1px solid #333; margin-top: 10px; justify-content: center; flex-wrap: wrap; }
        .ui-panel input { width: 60px; padding: 8px; text-align: center; font-weight: bold; border: 2px solid #f1c40f; background: #000; color: #f1c40f; border-radius: 5px; font-size: 1.1em; }
        button { padding: 10px 16px; font-weight: bold; background: #f1c40f; color: #000; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0 #d4ac0d; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d4ac0d; }
        
        /* 토글 버튼 특화 */
        .btn-fog { background: #9b59b6; box-shadow: 0 4px 0 #8e44ad; color: white; }
        .btn-fog:active { box-shadow: 0 2px 0 #8e44ad; }
        
        #log { flex-basis: 100%; background: #000; color: #2ecc71; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9em; border-left: 4px solid #2ecc71; text-align: left; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-container">
        <h1 style="color:#f1c40f; margin-top:0;">🏰 노리톤 대미궁</h1>
        
        <div class="input-group">
            <label>미궁 규모</label>
            <select id="map-size">
                <option value="small">작음 (빠른 탐사)</option>
                <option value="medium">중간 (표준 탐사)</option>
                <option value="large" selected>큼 (화면 꽉 차게)</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>갈림길 생성 개수</label>
            <input type="number" id="fork-count" value="8" min="1" max="30">
        </div>
        
        <div class="input-group">
            <label>목표(GOAL) 개수</label>
            <input type="number" id="goal-count" value="3" min="1" max="10">
        </div>
        <button onclick="startGame()" style="margin-top: 10px; padding: 12px 25px; font-size: 1.1em;">미궁 생성 및 입장</button>
    </div>

    <div id="game-screen">
        <div id="board-wrapper">
            <div id="board"></div>
        </div>
        
        <div class="ui-panel">
            <button id="fog-btn" class="btn-fog" onclick="toggleFog()">발판 숨기기 (ON)</button>
            <div style="color:#f1c40f; font-weight:bold; font-size:1.1em; margin: 0 10px;">행동력: <span id="steps-left">0</span></div>
            <input type="number" id="dice-input" placeholder="0">
            <button onclick="applySteps()">이동력 주입</button>
            <button onclick="resetMaze()" style="background:#c0392b; box-shadow:0 4px 0 #922b21; color:#fff; margin-left: auto;">맵 재설계</button>
            
            <div id="log">안전하게 진입했습니다. 행동력을 입력하세요. [발판 숨기기]로 미궁 전체를 가릴 수 있습니다.</div>
        </div>
    </div>

    <script>
        const TILE_SIZE = 28;
        let COLS = 30;
        let ROWS = 20;
        
        let grid = [];
        let playerPos = { x: 1, y: 1 };
        let moveSteps = 0;
        let goalList = [];
        let allPaths = [];
        let isFogOn = false;

        function startGame() {
            // 브라우저 해상도에 맞춘 최대(큼) 사이즈 계산 (스크롤 없는 꽉 찬 화면)
            const maxCols = Math.max(20, Math.floor(window.innerWidth * 0.95 / TILE_SIZE));
            const maxRows = Math.max(15, Math.floor(window.innerHeight * 0.75 / TILE_SIZE));

            // 맵 사이즈 설정 적용
            const sizeMap = {
                'small': { c: Math.floor(maxCols * 0.5), r: Math.floor(maxRows * 0.5) },
                'medium': { c: Math.floor(maxCols * 0.75), r: Math.floor(maxRows * 0.75) },
                'large': { c: maxCols, r: maxRows }
            };
            const selectedSize = document.getElementById('map-size').value;
            COLS = sizeMap[selectedSize].c;
            ROWS = sizeMap[selectedSize].r;

            const forks = parseInt(document.getElementById('fork-count').value) || 5;
            const goals = parseInt(document.getElementById('goal-count').value) || 2;
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            // 입장 시 안개 모드 초기화
            isFogOn = false;
            document.getElementById('board').classList.remove('fog-mode');
            document.getElementById('fog-btn').innerText = "발판 숨기기 (ON)";
            document.getElementById('fog-btn').style.background = "#9b59b6";
            document.getElementById('fog-btn').style.boxShadow = "0 4px 0 #8e44ad";
            
            buildMaze(forks, goals);
        }

        function buildMaze(totalForks, totalGoals) {
            const board = document.getElementById('board');
            board.style.gridTemplateColumns = `repeat(${COLS}, ${TILE_SIZE}px)`;
            board.style.gridTemplateRows = `repeat(${ROWS}, ${TILE_SIZE}px)`;
            board.innerHTML = '';
            
            grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            goalList = [];
            allPaths = [];

            let startY = Math.floor(ROWS / 2);

            // 1. 메인 척추 경로 (오른쪽으로)
            let mainRoot = createTrunkPath(1, startY);
            allPaths.push(...mainRoot);

            // 2. 갈림길 생성
            let forksCreated = 0;
            let attempts = 0;
            let branches = [];

            while(forksCreated < totalForks && attempts < 300) {
                let basePoint = allPaths[Math.floor(Math.random() * allPaths.length)];
                let branchLen = Math.floor(Math.random() * 10) + 5;
                
                let newBranch = createBranchPath(basePoint.x, basePoint.y, branchLen);
                if(newBranch.length > 2) {
                    allPaths.push(...newBranch);
                    branches.push(newBranch);
                    forksCreated++;
                }
                attempts++;
            }

            // 3. 목표 지점(GOAL) 배치
            branches.sort((a, b) => b.length - a.length);
            for(let i = 0; i < totalGoals && i < branches.length; i++) {
                goalList.push(branches[i][branches[i].length - 1]);
            }
            if(goalList.length < totalGoals && mainRoot.length > 0) {
                goalList.push(mainRoot[mainRoot.length - 1]);
            }
            if(goalList.length === 0) goalList.push(mainRoot[mainRoot.length - 1]);

            // 4. 발판 비율 1:1:1 균등 분배 로직
            let pathCells = [];
            for(let y = 0; y < ROWS; y++) {
                for(let x = 0; x < COLS; x++) {
                    const isStart = (x === 1 && y === startY);
                    const isGoal = goalList.find(g => g.x === x && g.y === y);
                    if(grid[y][x] === 1 && !isStart && !isGoal) {
                        pathCells.push({x, y});
                    }
                }
            }

            let colorPool = [];
            let third = Math.floor(pathCells.length / 3);
            let remainder = pathCells.length % 3;
            
            for(let i=0; i<third; i++) { colorPool.push('blue', 'red', 'gray'); }
            let extras = ['blue', 'red', 'gray'].sort(() => Math.random() - 0.5);
            for(let i=0; i<remainder; i++) { colorPool.push(extras[i]); }
            colorPool.sort(() => Math.random() - 0.5); // 완전히 섞기

            // 5. 화면 렌더링
            let colorIndex = 0;
            for(let y = 0; y < ROWS; y++) {
                for(let x = 0; x < COLS; x++) {
                    const cell = document.createElement('div');
                    cell.id = `c-${x}-${y}`;
                    cell.className = 'cell ' + (grid[y][x] === 1 ? 'path' : 'wall');
                    
                    if(grid[y][x] === 1) {
                        const isStart = (x === 1 && y === startY);
                        const isGoal = goalList.find(g => g.x === x && g.y === y);
                        
                        if(isStart) { 
                            cell.classList.add('start'); cell.innerText = "S"; 
                            playerPos = {x, y}; 
                        } else if(isGoal) { 
                            cell.classList.add('goal'); cell.innerText = "G"; 
                        } else {
                            cell.classList.add(colorPool[colorIndex]);
                            colorIndex++;
                        }
                    }
                    board.appendChild(cell);
                }
            }
            updatePawn();
            logTxt(`미궁 크기 [${COLS}x${ROWS}] 생성 완료! 이벤트 타일이 균등 배치되었습니다.`);
        }

        function createTrunkPath(sx, sy) {
            let path = [{x: sx, y: sy}];
            grid[sy][sx] = 1;
            let cx = sx, cy = sy;
            while(cx < COLS - 3) {
                let dirs = [{x:1, y:0}, {x:1, y:0}, {x:1, y:0}, {x:0, y:1}, {x:0, y:-1}].sort(() => Math.random() - 0.5);
                let moved = false;
                for(let d of dirs) {
                    let nx = cx + d.x, ny = cy + d.y;
                    if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && grid[ny][nx] === 0) {
                        if(countNeighbors(nx, ny) === 1) {
                            grid[ny][nx] = 1;
                            cx = nx; cy = cy; // 수정: cy=ny로 해야 이동됨
                            cx = nx; cy = ny; 
                            path.push({x: cx, y: cy});
                            moved = true;
                            break;
                        }
                    }
                }
                if(!moved) break;
            }
            return path;
        }

        function createBranchPath(sx, sy, maxLen) {
            let path = [];
            let cx = sx, cy = sy;
            for(let i = 0; i < maxLen; i++) {
                let dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}].sort(() => Math.random() - 0.5);
                let moved = false;
                for(let d of dirs) {
                    let nx = cx + d.x, ny = cy + d.y;
                    if(nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1 && grid[ny][nx] === 0) {
                        if(countNeighbors(nx, ny) === 1) {
                            grid[ny][nx] = 1;
                            cx = nx; cy = ny;
                            path.push({x: cx, y: cy});
                            moved = true;
                            break;
                        }
                    }
                }
                if(!moved) break;
            }
            return path;
        }

        function countNeighbors(x, y) {
            let count = 0;
            if(grid[y-1] && grid[y-1][x] === 1) count++;
            if(grid[y+1] && grid[y+1][x] === 1) count++;
            if(grid[y][x-1] === 1) count++;
            if(grid[y][x+1] === 1) count++;
            return count;
        }

        // 안개 토글 시스템
        function toggleFog() {
            isFogOn = !isFogOn;
            const board = document.getElementById('board');
            const btn = document.getElementById('fog-btn');
            
            if(isFogOn) {
                board.classList.add('fog-mode');
                btn.innerText = "발판 보이기 (OFF)";
                btn.style.background = "#e67e22";
                btn.style.boxShadow = "0 4px 0 #d35400";
                logTxt("안개가 미궁을 덮습니다. 골(GOAL)을 포함한 모든 발판이 숨겨졌습니다.");
            } else {
                board.classList.remove('fog-mode');
                btn.innerText = "발판 숨기기 (ON)";
                btn.style.background = "#9b59b6";
                btn.style.boxShadow = "0 4px 0 #8e44ad";
                logTxt("안개가 걷혔습니다. 미궁의 진정한 모습이 드러납니다.");
            }
        }

        function applySteps() {
            const val = parseInt(document.getElementById('dice-input').value);
            if(isNaN(val) || val <= 0) return;
            moveSteps = val;
            document.getElementById('steps-left').innerText = moveSteps;
            document.getElementById('dice-input').value = '';
            showMovable();
        }

        function showMovable() {
            document.querySelectorAll('.movable').forEach(el => { el.classList.remove('movable'); el.onclick = null; });
            if(moveSteps <= 0) { checkTile(); return; }

            [{x:0, y:1}, {x:0, y:-1}, {x:1, y:0}, {x:-1, y:0}].forEach(d => {
                let nx = playerPos.x + d.x, ny = playerPos.y + d.y;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[ny][nx] === 1) {
                    const el = document.getElementById(`c-${nx}-${ny}`);
                    el.classList.add('movable');
                    el.onclick = () => { 
                        playerPos = {x: nx, y: ny}; 
                        moveSteps--; 
                        document.getElementById('steps-left').innerText = moveSteps; 
                        updatePawn(); 
                        showMovable(); 
                    };
                }
            });
        }

        function updatePawn() {
            let p = document.getElementById('pawn') || document.createElement('div');
            p.id = 'pawn'; p.className = 'pawn';
            const currentCell = document.getElementById(`c-${playerPos.x}-${playerPos.y}`);
            if(currentCell) currentCell.appendChild(p);
        }

        function checkTile() {
            const isG = goalList.find(g => g.x === playerPos.x && g.y === playerPos.y);
            if(isG) { 
                alert("🎉 축하합니다! GOAL에 무사히 도달했습니다!"); 
                resetMaze(); 
                return; 
            }
            
            const cl = document.getElementById(`c-${playerPos.x}-${playerPos.y}`).classList;
            if(cl.contains('blue')) logTxt("턴 종료: [파란색] 행운이 따릅니다! 파밍 판정을 하세요.");
            else if(cl.contains('red')) logTxt("턴 종료: [빨간색] 위험합니다! Health 기반 회피 판정을 하세요.");
            else logTxt("턴 종료: 주변은 고요한 복도입니다. 다음 주사위를 굴리세요.");
        }

        function logTxt(m) { document.getElementById('log').innerText = "> " + m; }
        function resetMaze() { document.getElementById('setup-screen').style.display = 'block'; document.getElementById('game-screen').style.display = 'none'; }
    </script>
</body>
</html>
