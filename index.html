<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRPG RPG Core</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" id="activeSigil">TR</span>
          <div>
            <p class="eyebrow">Turn Based RPG Core</p>
            <h1 id="activeName">TRPG RPG</h1>
          </div>
        </div>

        <nav class="character-switcher" id="characterSwitcher" aria-label="메인 캐릭터 선택"></nav>

        <div class="top-actions">
          <button class="ghost-button" id="saveButton" type="button">저장</button>
          <button class="ghost-button" id="resetButton" type="button">초기화</button>
        </div>
      </header>

      <section class="layout-grid">
        <aside class="party-panel" aria-label="파티">
          <section class="hero-card" id="heroCard"></section>

          <section class="party-slots">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Party</p>
                <h2>파티 슬롯</h2>
              </div>
            </div>
            <div id="partySlots" class="party-slot-list"></div>
          </section>

          <section class="log-panel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Log</p>
                <h2>진행 기록</h2>
              </div>
            </div>
            <div class="log-list" id="logList" aria-live="polite"></div>
          </section>
        </aside>

        <section class="play-panel" aria-label="탐험과 전투">
          <div class="mode-toolbar">
            <div class="segmented-control" role="tablist" aria-label="모드">
              <button class="mode-button is-active" id="profileModeButton" type="button" data-mode="profile">상태창</button>
              <button class="mode-button" id="exploreModeButton" type="button" data-mode="explore">탐험</button>
              <button class="mode-button" id="combatModeButton" type="button" data-mode="combat">전투</button>
            </div>
            <div class="mode-actions">
              <button class="solid-button" id="startCombatButton" type="button">전투 시작</button>
              <button class="ghost-button" id="endCombatButton" type="button" hidden>전투 종료</button>
              <button class="ghost-button" id="rerollInitiativeButton" type="button" hidden>속도 재계산</button>
            </div>
          </div>

          <section class="board-zone">
            <div class="board-head">
              <div>
                <p class="section-kicker" id="boardKicker">Explore</p>
                <h2 id="boardTitle">파티 탐험 보드</h2>
              </div>
              <div class="board-meta" id="boardMeta"></div>
            </div>
            <div class="board-frame">
              <div class="board" id="board" aria-label="전술 격자"></div>
            </div>
          </section>

          <section class="turn-panel" id="turnPanel">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Initiative</p>
                <h2>턴 순서</h2>
              </div>
            </div>
            <div class="turn-list" id="turnList"></div>
          </section>
        </section>

        <aside class="sheet-panel" aria-label="상태창">
          <nav class="sheet-tabs" role="tablist" aria-label="상태창 탭">
            <button class="sheet-tab is-active" type="button" data-tab="overview">상태</button>
            <button class="sheet-tab" type="button" data-tab="equipment">장비</button>
            <button class="sheet-tab" type="button" data-tab="skills">스킬</button>
            <button class="sheet-tab" type="button" data-tab="bag">가방</button>
            <button class="sheet-tab" type="button" data-tab="party">파티</button>
          </nav>
          <div class="sheet-content" id="sheetContent"></div>

          <section class="combat-control" id="combatControl" hidden>
            <div class="panel-heading">
              <div>
                <p class="section-kicker">Action</p>
                <h2>전투 행동</h2>
              </div>
            </div>
            <div id="combatActionPanel"></div>
          </section>
        </aside>
      </section>
    </main>

    <div class="modal" id="confirmModal" hidden>
      <form class="modal-card" id="confirmForm">
        <h2 id="confirmTitle">확인</h2>
        <p id="confirmMessage"></p>
        <div class="modal-actions">
          <button class="ghost-button" id="confirmNo" type="button">아니오</button>
          <button class="solid-button" type="submit">예</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
