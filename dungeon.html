<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Random Dungeon Board</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* 보드판: 칸들이 가로로 정렬됨 */
        #board { 
            display: flex; 
            gap: 12px; 
            padding: 40px; 
            background: #2c3e50; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 95vw;
            overflow-x: auto;
            border: 4px solid #34495e;
        }

        /* 칸 디자인 */
        .tile { 
            width: 70px; 
            height: 70px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            font-size: 0.7em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        /* 색상 정의 */
        .gray { background: #95a5a6; border-bottom: 5px solid #7f8c8d; } /* 일반 */
        .blue { background: #3498db; border-bottom: 5px solid #2980b9; } /* 긍정/파밍 */
        .red { background: #e74c3c; border-bottom: 5px solid #c0392b; }  /* 부정/위험 */

        /* 말 (Pawn) */
        .pawn { 
            width: 45px; 
            height: 45px; 
            background: #f1c40f; 
            border-radius: 50%; 
            border: 4px solid #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            z-index: 10;
            transition: all 0.2s ease-in-out;
        }

        .controls { margin-top: 50px; text-align: center; }
        button { 
            padding: 15px 50px; 
            font-size: 1.3em; 
            font-weight: bold; 
            background: #f1c40f; 
            color: #000;
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            box-shadow: 0 5px 0 #d4ac0d;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #d4ac0d; }
        #dice-text { font-size: 1.8em; margin-bottom: 20px; color: #f1c40f; }
    </style>
</head>
<body>

    <div id="dice-text">던전에 입장하셨습니다!</div>

    <div id="board"></div>

    <div class="controls">
        <button onclick="rollAndMove()">주사위 굴리기</button>
        <p style="color: #888; margin-top: 15px;">새로고침(F5)을 누르면 보드판이 무작위로 재구성됩니다.</p>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const diceText = document.getElementById('dice-text');
        
        let currentPos = 0;
        const totalTiles = 12; // 칸 개수 (화면에 맞게 조절 가능)

        // 1. 보드판 무작위 생성 로직
        const colors = ['gray', 'blue', 'red'];
        
        for (let i = 0; i < totalTiles; i++) {
            // 무작위 색상 선택 (0번 칸은 항상 회색 시작점)
            let type = (i === 0) ? 'gray' : colors[Math.floor(Math.random() * 3)];
            
            const div = document.createElement('div');
            div.className = `tile ${type}`;
            div.id = `tile-${i}`;
            
            // 특수 표시
            if(i === 0) div.innerText = "START";
            if(i === totalTiles - 1) div.innerText = "GOAL";
            
            boardEl.appendChild(div);
        }

        // 말 생성 및 배치
        const pawn = document.createElement('div');
        pawn.className = 'pawn';
        document.getElementById('tile-0').appendChild(pawn);

        // 2. 이동 함수
        function rollAndMove() {
            const roll = Math.floor(Math.random() * 6) + 1;
            diceText.innerText = `🎲 주사위: ${roll}`;

            currentPos += roll;
            
            // 골인 지점 처리
            if (currentPos >= totalTiles - 1) {
                currentPos = totalTiles - 1;
                diceText.innerText = `🎲 ${roll}! 목표 지점 도착!`;
            }

            const targetTile = document.getElementById(`tile-${currentPos}`);
            targetTile.appendChild(pawn);
        }
    </script>
</body>
</html>
